<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OtoFlow Recorder</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div class="logo">OF</div>
        <div>
          <h1>OtoFlow Recorder</h1>
          <p>Dış web uygulamasını kaydet</p>
        </div>
      </header>

      <div class="notice">Kayıt için uygulama girişi gerekmez. Aşağıdaki düğmeye basıp kaydetmek istediğiniz işi yapmanız yeterlidir.</div>

      <label>
        Yeni iş adı
        <input id="title" value="Dış uygulama iş kaydı" />
      </label>

      <label>
        Amaç
        <textarea id="goal">Kullanıcının dış web uygulamasında yaptığı işi tekrar çalıştırılabilir otomasyona çevir.</textarea>
      </label>

      <button id="toggle" class="primary">Kaydı Başlat</button>
      <button id="create" class="secondary">Yeni Kayıt Hazırla</button>

      <details>
        <summary>Bağlantı bilgileri</summary>
        <label>
          OtoFlow bağlantısı
          <input id="apiBase" value="http://localhost:4100" />
        </label>
        <label>
          Kayıt numarası
          <input id="sessionId" placeholder="Kayıt başlayınca otomatik oluşur" readonly />
        </label>
      </details>

      <p id="status">Hazır.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
